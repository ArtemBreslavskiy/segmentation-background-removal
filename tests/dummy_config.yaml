model:
  model_name: 'TestModel'

dataset:
  splits:
    ratios:
      val: 0.1
      test: 0.1
    seed: 42
    method: "random"

  max_area: 1048576  #1024**2
  resize_mode: "resize"

  weights:
    Dataset1: 0.7
    Dataset2: 1.5

dataloader:
  seed: 42
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  pad_collate:
    enabled: false
    alignment: 32
    pad_value: 0.0

learning:
  epochs: 100
  early_stopping_patience: 15
  accumulation_steps: 1
  use_pixels_accumulation: false
  pixels_per_step: 0
  use_fp16: false
  compile_model: false
  compile_dynamic: false
  compile_options: "default"
  log_interval: 5
  save_criterion: "val/iou"
  mode: "max"
  use_cuda: false
  threshold: 0.5